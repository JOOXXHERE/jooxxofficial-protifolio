<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jooxx — Videos Edited</title>
    <meta name="description" content="Explore my edited video works and post-production clips.">
    <!-- Google Fonts: Playfair Display (Serif) & Space Mono (Monospace) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
    <style>
        .projects-portal {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 24px;
            min-height: 100vh;
        }

        .portal-header {
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 60px;
        }

        .portal-header h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            line-height: 1.2;
        }

        .portal-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 600px;
        }

        /* Raw Videos Grid - 4 Column Layout */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 1200px;
            align-items: start;
        }

        .projects-grid video {
            width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #000;
            display: block;
            object-fit: contain;
            aspect-ratio: auto;
            transition: var(--transition-editorial);
        }

        .projects-grid video:hover {
            border-color: var(--text-color);
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        /* YouTube Channel CTA */
        .youtube-cta {
            margin-top: 50px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .btn-back-home {
            margin-top: 50px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back-home:hover {
            color: var(--text-color);
        }

        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .portal-header h1 {
                font-size: 2.5rem;
            }
            .projects-portal {
                padding: 80px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Custom Coordinate Crosshair Cursor -->
    <div class="cursor-crosshair" id="cursor-crosshair"></div>
    <div class="cursor-coords-badge" id="cursor-coords">X: 000 Y: 000</div>

    <!-- Page Transition Overlay -->
    <div class="page-transition-overlay slide-out" id="transition-overlay"></div>

    <!-- Main Works Showcase -->
    <main class="projects-portal">
        <div class="portal-header">
            <span class="mono-label">// visual editing portfolio</span>
            <h1>Videos Edited</h1>
            <p>Explore my editorial video cuts, sync reels, and motion designs loop-playing in high-performance web resolution.</p>
        </div>

        <div class="projects-grid">
            <!-- Ordered Grid of Video Loops -->
            <video src="videos/fully_finished.mp4" autoplay loop muted playsinline></video>
            <video src="videos/edited_no_audio.mp4" autoplay loop muted playsinline></video>
            <video src="videos/first_motion_video_lays.mp4" autoplay loop muted playsinline></video>
            <video src="videos/motion_2.mp4" autoplay loop muted playsinline></video>
            <video src="videos/motion_3.mp4" autoplay loop muted playsinline></video>
            <video src="videos/lyrical.mp4" autoplay loop muted playsinline></video>
            <video src="videos/lyrical_2.mp4" autoplay loop muted playsinline></video>
            <video src="videos/whatsapp_video_5.mp4" autoplay loop muted playsinline></video>
            <video src="videos/whatsapp_video_4.mp4" autoplay loop muted playsinline></video>
            <video src="videos/whatsapp_video_3.mp4" autoplay loop muted playsinline></video>
            <video src="videos/whatsapp_video_2.mp4" autoplay loop muted playsinline></video>
            <video src="videos/whatsapp_video_1.mp4" autoplay loop muted playsinline></video>
        </div>

        <!-- YouTube Call to Action underneath grid -->
        <div class="youtube-cta">
            To see more, check my <a href="https://www.youtube.com/@CaptainJOOXX/featured" target="_blank" class="footer-link" style="color: var(--text-color); text-decoration: underline;">YouTube channel</a>
        </div>

        <a href="../" class="btn-back-home transition-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </main>

    <!-- Custom JS -->
    <script src="../script.js"></script>
</body>
</html>
