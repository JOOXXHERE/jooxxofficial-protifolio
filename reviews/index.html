<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jooxx — Reviews</title>
    <meta name="description" content="Read reviews, feedback, and client testimonials about my video editing and web development work.">
    <!-- Google Fonts: Playfair Display (Serif) & Space Mono (Monospace) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="../favicon.jpg">
    <style>
        .reviews-portal {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 24px;
            min-height: 100vh;
        }

        .portal-header {
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .portal-header h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            line-height: 1.2;
        }

        .portal-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 600px;
        }

        /* Review Trigger Button */
        .btn-write-review {
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 12px 24px;
            border-radius: 4px;
            transition: var(--transition-fast);
            margin-bottom: 60px;
        }

        .btn-write-review:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* Review Form Section */
        .review-form-container {
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
            background-color: rgba(18, 18, 18, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 60px;
            display: none; /* Toggle display */
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rating-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .star-rating-selector {
            display: flex;
            gap: 8px;
            font-size: 1.6rem;
            color: var(--text-muted);
        }

        .star-rating-selector i {
            transition: var(--transition-fast);
        }

        .star-rating-selector i.active,
        .star-rating-selector i.hover {
            color: #ffc107;
        }

        /* Editorial Testimonials List */
        .reviews-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .review-item {
            padding: 48px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeIn 0.6s ease-out;
        }

        .review-item:first-child {
            padding-top: 0;
        }

        .review-stars {
            color: #ffc107;
            font-size: 0.9rem;
            display: flex;
            gap: 4px;
        }

        .review-quote {
            font-family: var(--font-serif);
            font-size: 1.65rem;
            font-style: italic;
            line-height: 1.5;
            color: var(--text-color);
        }

        .review-author-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .review-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .review-author::before {
            content: "";
            display: inline-block;
            width: 20px;
            height: 1px;
            background-color: var(--border-color);
        }

        .empty-state {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            padding: 60px 0;
            border-bottom: 1px solid var(--border-color);
            width: 100%;
            max-width: 800px;
        }

        .btn-back-home {
            margin-top: 60px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back-home:hover {
            color: var(--text-color);
        }

        .db-status-badge {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .db-status-badge.synced {
            color: #00ff66;
            border-color: rgba(0, 255, 102, 0.2);
        }

        @media (max-width: 768px) {
            .portal-header h1 {
                font-size: 2.5rem;
            }
            .review-quote {
                font-size: 1.35rem;
            }
            .reviews-portal {
                padding: 80px 24px;
            }
            .review-item {
                padding: 36px 0;
            }
            .review-form-container {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Custom Coordinate Crosshair Cursor -->
    <div class="cursor-crosshair" id="cursor-crosshair"></div>
    <div class="cursor-coords-badge" id="cursor-coords">X: 000 Y: 000</div>

    <!-- Page Transition Overlay -->
    <div class="page-transition-overlay slide-out" id="transition-overlay"></div>

    <!-- Hidden Iframe to target form POST requests to prevent page redirects -->
    <iframe name="hidden_reviews_iframe" id="hidden_reviews_iframe" style="display:none;" onload="if(window.reviews_submitted) { window.handleReviewsSuccess(); }"></iframe>

    <!-- Main Reviews Showcase -->
    <main class="reviews-portal">
        <div class="portal-header">
            <span class="mono-label">// client statements</span>
            <h1>Reviews & Feedback</h1>
            <p>Statements and critiques from creative partners, agencies, and contract collaborators.</p>
            <div class="db-status-badge" id="db-status">Loading Database...</div>
        </div>

        <!-- Write a Review Button -->
        <button class="btn-write-review fade-reveal" style="transition-delay: 0.1s;" id="btn-toggle-form">Write a Review</button>

        <!-- Review Input Form (Hidden by default) -->
        <div class="review-form-container" id="review-form-box">
            <h3 class="mono-label" style="color: var(--text-color); font-size: 0.85rem;">Submit Testimonial</h3>
            
            <form id="new-review-form" method="POST" target="hidden_reviews_iframe">
                <!-- Hidden inputs dynamically set names based on DB Config -->
                <input type="hidden" id="reviewer-rating-input" name="entry.rating" value="5">

                <div class="form-group">
                    <label for="reviewer-name" class="mono-label">Your Name / Agency</label>
                    <input type="text" id="reviewer-name" name="entry.name" class="studio-input" placeholder="e.g. John Doe, Pulse Media" required>
                </div>

                <div class="form-group margin-top-large">
                    <label for="reviewer-text" class="mono-label">Review / Feedback</label>
                    <textarea id="reviewer-text" name="entry.text" class="studio-textarea" placeholder="Tell others about your experience working with me..." required></textarea>
                </div>

                <div class="rating-input-group margin-top-large">
                    <label class="mono-label">Rating</label>
                    <div class="star-rating-selector" id="star-selector">
                        <i class="fa-star fa-regular" data-rating="1"></i>
                        <i class="fa-star fa-regular" data-rating="2"></i>
                        <i class="fa-star fa-regular" data-rating="3"></i>
                        <i class="fa-star fa-regular" data-rating="4"></i>
                        <i class="fa-star fa-regular" data-rating="5"></i>
                    </div>
                </div>

                <div class="submit-row" style="margin-top: 32px;">
                    <button type="submit" class="btn-studio-submit" id="review-submit-btn">
                        Post Review <i class="fa-solid fa-paper-plane icon-right"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Testimonials List Container -->
        <div class="reviews-list fade-reveal" style="transition-delay: 0.2s;" id="reviews-feed">
            <!-- Dynamic Content Injected Here -->
        </div>

        <a href="../" class="btn-back-home transition-link fade-reveal" style="transition-delay: 0.3s;">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </main>

    <!-- Custom JS -->
    <script src="../script.js"></script>
    <script>
        // ==========================================================================
        // GOOGLE SHEETS & FORMS DATABASE CONFIGURATION
        // ==========================================================================
        // To deploy your global reviews database:
        // 1. Create a Google Form with 3 fields: Name, Review, and Rating.
        // 2. Link it to a Google Sheet.
        // 3. Publish the Google Sheet to the Web: File > Share > Publish to the Web > Select Sheet tab > CSV format.
        // 4. Fill in the Form action URL, entry IDs, and published CSV link below.
        const DB_CONFIG = {
            formAction: "https://docs.google.com/forms/d/e/1FAIpQLSe5Aq8sNegC_fcHnP28jZ0vKkQs7BzOY9umqDGFK9NJmaQXbA/formResponse",
            entryName: "entry.68548011",
            entryText: "entry.1305727315",
            entryRating: "entry.125570854",
            sheetsCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFGyTE5wALqKNtu0gtKUX4-tY32Blf2tiy2Szr38TNsSQaAiIhP2RfhITi2HbVlaC1SzdHmRZ_dXTb/pub?gid=1513945941&single=true&output=csv"
        };

        document.addEventListener('DOMContentLoaded', () => {
            const btnToggleForm = document.getElementById('btn-toggle-form');
            const reviewFormBox = document.getElementById('review-form-box');
            const newReviewForm = document.getElementById('new-review-form');
            const reviewerName = document.getElementById('reviewer-name');
            const reviewerText = document.getElementById('reviewer-text');
            const starSelector = document.getElementById('star-selector');
            const reviewsFeed = document.getElementById('reviews-feed');
            const ratingInput = document.getElementById('reviewer-rating-input');
            const dbStatus = document.getElementById('db-status');
            const submitBtn = document.getElementById('review-submit-btn');

            let selectedRating = 5;
            window.reviews_submitted = false;

            // Check if DB Config is fully mapped
            const isDbConfigured = DB_CONFIG.formAction && DB_CONFIG.entryName && DB_CONFIG.entryText && DB_CONFIG.entryRating && DB_CONFIG.sheetsCsvUrl;

            if (isDbConfigured) {
                dbStatus.textContent = "Google Sheets DB: Synced";
                dbStatus.className = "db-status-badge synced";
                
                // Map Form settings dynamically
                newReviewForm.action = DB_CONFIG.formAction;
                reviewerName.name = DB_CONFIG.entryName;
                reviewerText.name = DB_CONFIG.entryText;
                ratingInput.name = DB_CONFIG.entryRating;
            } else {
                dbStatus.textContent = "Running: LocalStorage Mode (Setup Sheet link to Sync)";
                dbStatus.className = "db-status-badge";
            }

            // Toggle form open/close
            btnToggleForm.addEventListener('click', () => {
                if (reviewFormBox.style.display === 'flex') {
                    reviewFormBox.style.display = 'none';
                    btnToggleForm.textContent = 'Write a Review';
                } else {
                    reviewFormBox.style.display = 'flex';
                    btnToggleForm.textContent = 'Cancel';
                    reviewFormBox.scrollIntoView({ behavior: 'smooth' });
                }
            });

            // Star Rating Selector Interaction
            const stars = Array.from(starSelector.querySelectorAll('i'));
            
            function updateStars(rating, type = 'active') {
                stars.forEach((star, index) => {
                    if (index < rating) {
                        star.classList.remove('fa-regular');
                        star.classList.add('fa-solid', type);
                    } else {
                        star.classList.remove('fa-solid', 'active', 'hover');
                        star.classList.add('fa-regular');
                    }
                });
            }

            updateStars(selectedRating);

            stars.forEach(star => {
                star.addEventListener('mouseenter', () => {
                    const rating = parseInt(star.getAttribute('data-rating'));
                    updateStars(rating, 'hover');
                });

                star.addEventListener('mouseleave', () => {
                    updateStars(selectedRating, 'active');
                });

                star.addEventListener('click', () => {
                    selectedRating = parseInt(star.getAttribute('data-rating'));
                    ratingInput.value = selectedRating;
                    updateStars(selectedRating, 'active');
                });
            });

            // --- Database Handlers ---
            const STORAGE_KEY = 'jooxx_portfolio_reviews';

            function getLocalReviews() {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveLocalReviews(reviews) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
            }

            // CSV Parsing Logic
            function parseCSV(csvText) {
                const lines = [];
                let row = [""];
                let inQuotes = false;
                
                for (let i = 0; i < csvText.length; i++) {
                    const char = csvText[i];
                    const nextChar = csvText[i+1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            row[row.length - 1] += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        row.push("");
                    } else if ((char === '\r' || char === '\n') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') {
                            i++;
                        }
                        lines.push(row);
                        row = [""];
                    } else {
                        row[row.length - 1] += char;
                    }
                }
                if (row.length > 1 || row[0] !== "") {
                    lines.push(row);
                }
                return lines;
            }

            async function fetchGlobalReviews() {
                try {
                    const response = await fetch(DB_CONFIG.sheetsCsvUrl);
                    if (!response.ok) throw new Error("Network status error");
                    const csvText = await response.text();
                    const parsedLines = parseCSV(csvText);

                    // Skip header line (Timestamp, Name, Review, Rating)
                    const dataLines = parsedLines.slice(1);
                    
                    return dataLines.map(cols => {
                        // Standard Google Sheet responses columns mapping
                        // Timestamp is at cols[0], Name at cols[1], Review text at cols[2], Rating at cols[3]
                        let rawDate = cols[0] || "";
                        let cleanDate = rawDate.split(" ")[0] || rawDate; // extract date block
                        
                        return {
                            name: cols[1] || "Anonymous",
                            text: cols[2] || "",
                            rating: parseInt(cols[3]) || 5,
                            date: cleanDate
                        };
                    }).filter(r => r.text.trim() !== ""); // Filter out blank rows
                } catch (e) {
                    console.error("Sheets DB fetch error, falling back to LocalStorage:", e);
                    return getLocalReviews();
                }
            }

            async function renderReviews() {
                reviewsFeed.innerHTML = '<div class="empty-state">Loading feedback stream...</div>';
                
                let reviews = [];
                if (isDbConfigured) {
                    reviews = await fetchGlobalReviews();
                } else {
                    reviews = getLocalReviews();
                }

                reviewsFeed.innerHTML = '';

                if (reviews.length === 0) {
                    reviewsFeed.innerHTML = `
                        <div class="empty-state" id="reviews-empty">
                            No reviews posted yet. Be the first to write a testimonial!
                        </div>
                    `;
                    return;
                }

                // Render in reverse chronological order (newest first)
                reviews.slice().reverse().forEach(review => {
                    const item = document.createElement('div');
                    item.className = 'review-item';

                    // Generate stars
                    let starsMarkup = '';
                    for (let i = 1; i <= 5; i++) {
                        if (i <= review.rating) {
                            starsMarkup += '<i class="fa-solid fa-star"></i>';
                        } else {
                            starsMarkup += '<i class="fa-regular fa-star"></i>';
                        }
                    }

                    item.innerHTML = `
                        <div class="review-stars">
                            ${starsMarkup}
                        </div>
                        <blockquote class="review-quote">
                            "${escapeHTML(review.text)}"
                        </blockquote>
                        <div class="review-author-meta">
                            <span class="review-author">${escapeHTML(review.name)}</span>
                            <span>${review.date}</span>
                        </div>
                    `;
                    reviewsFeed.appendChild(item);
                });
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }

            // Post new review form submission handler
            newReviewForm.addEventListener('submit', (e) => {
                const name = reviewerName.value.trim();
                const text = reviewerText.value.trim();
                
                if (!name || !text) {
                    e.preventDefault();
                    return;
                }

                // Optimistic UI updates
                const tempReview = {
                    name: name,
                    text: text,
                    rating: selectedRating,
                    date: new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
                };

                // Trigger submission animations
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Posting... <i class="fa-solid fa-spinner fa-spin icon-right"></i>';

                if (isDbConfigured) {
                    // Running under sheets DB: Forms POST occurs in hidden iframe target
                    window.reviews_submitted = true;
                    
                    // Optimistic insert to make UX look instant
                    const feedList = document.getElementById('reviews-feed');
                    const emptyState = document.getElementById('reviews-empty');
                    if (emptyState) emptyState.remove();

                    const optimisticItem = document.createElement('div');
                    optimisticItem.className = 'review-item';
                    let starsMarkup = '';
                    for (let i = 1; i <= 5; i++) {
                        starsMarkup += i <= selectedRating ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
                    }
                    optimisticItem.innerHTML = `
                        <div class="review-stars">${starsMarkup}</div>
                        <blockquote class="review-quote">"${escapeHTML(text)}"</blockquote>
                        <div class="review-author-meta">
                            <span class="review-author">${escapeHTML(name)}</span>
                            <span>Just Now</span>
                        </div>
                    `;
                    feedList.insertBefore(optimisticItem, feedList.firstChild);
                } else {
                    e.preventDefault(); // cancel standard submit since we are in LocalStorage fallback
                    const reviews = getLocalReviews();
                    reviews.push(tempReview);
                    saveLocalReviews(reviews);
                    
                    handlePostReset();
                    renderReviews();
                }
            });

            function handlePostReset() {
                newReviewForm.reset();
                selectedRating = 5;
                ratingInput.value = selectedRating;
                updateStars(selectedRating);
                reviewFormBox.style.display = 'none';
                btnToggleForm.textContent = 'Write a Review';
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Post Review <i class="fa-solid fa-paper-plane icon-right"></i>';
            }

            // Triggers when hidden iframe finishes loading (success)
            window.handleReviewsSuccess = () => {
                handlePostReset();
                window.reviews_submitted = false;

                // Re-fetch sheet list to align states
                setTimeout(() => {
                    renderReviews();
                }, 2000); // 2 second delay to let Google Sheet process response
            };

            // Initial feed load
            renderReviews();
        });
    </script>
</body>
</html>
