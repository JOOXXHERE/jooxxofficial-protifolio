<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jooxx — Works Under Construction</title>
    <meta name="description" content="Portfolio works directory is currently under construction. Check back soon.">
    <!-- Google Fonts: Playfair Display (Serif) & Space Mono (Monospace) & Inter (Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .projects-portal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 80px 24px;
        }

        .portal-header {
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .portal-header h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            line-height: 1.2;
        }

        .portal-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .construction-icon-box {
            font-size: 4rem;
            color: var(--text-color);
            margin-bottom: 12px;
            opacity: 0.85;
            animation: floatIcon 4s ease-in-out infinite alternate;
        }

        @keyframes floatIcon {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-10px) rotate(5deg); }
        }

        .btn-back-home {
            margin-top: 50px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back-home:hover {
            color: var(--text-color);
        }

        @media (max-width: 768px) {
            .portal-header h1 {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- Custom Coordinate Crosshair Cursor -->
    <div class="cursor-crosshair" id="cursor-crosshair"></div>
    <div class="cursor-coords-badge" id="cursor-coords">X: 000 Y: 000</div>

    <!-- Main Portal Wrapper -->
    <main class="projects-portal">
        <div class="portal-header">
            <div class="construction-icon-box">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <span class="mono-label">// Works Directory</span>
            <h1>Under Construction</h1>
            <p>I am currently assembling my video editing reels, website engineering projects, and classical piano performances. Check back soon for the completed portal showcase.</p>
        </div>

        <a href="index.html" class="btn-back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </main>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
